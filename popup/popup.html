<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FreeZone - Блокировщик рекламы</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="popup-container">
    <!-- Шапка -->
    <div class="header">
        <div class="logo">FZ</div>
        <div class="title">FreeZone</div>
        <div class="version">v1.0.0</div>
    </div>

    <!-- Статус -->
    <div class="status-card" id="statusCard">
        <div class="status-icon" id="statusIcon">🛡️</div>
        <div class="status-info">
            <div class="status-text" id="statusText">Активен</div>
            <div class="status-sub" id="statusSub">Защита включена</div>
        </div>
        <div class="status-toggle">
            <label class="switch">
                <input type="checkbox" id="toggleProtection" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <!-- Статистика -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="blockedToday">0</div>
            <div class="stat-label">Сегодня</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="blockedTotal">0</div>
            <div class="stat-label">Всего</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="blockRate">0</div>
            <div class="stat-label">За минуту</div>
        </div>
    </div>

    <!-- Логи -->
    <div class="logs-section">
        <div class="logs-header">
            <span>📋 Логи работы</span>
            <button class="btn-clear-logs" id="clearLogs">Очистить</button>
        </div>
        <div class="logs-container" id="logsContainer">
            <div class="log-entry log-info">🟢 Расширение запущено</div>
            <div class="log-entry log-info">🔄 Ожидание загрузки страницы...</div>
        </div>
    </div>

    <!-- Кнопки -->
    <div class="actions">
        <button class="btn btn-primary" id="refreshBtn">🔄 Обновить</button>
        <button class="btn btn-secondary" id="resetStatsBtn">📊 Сброс</button>
    </div>

    <!-- Footer -->
    <div class="footer">
        <span>🛡️ Защита активна</span>
        <span id="currentSite">🌐 rutube.ru</span>
    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
